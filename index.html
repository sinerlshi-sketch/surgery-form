const DEFAULT_ROC_YEAR = 115;

function parseSurgeryDate(val) {
  // 115/3/24
  let m3 = val.match(/^(\d+)\/(\d+)\/(\d+)$/);
  if (m3) return { y: parseInt(m3[1]), m: parseInt(m3[2]), d: parseInt(m3[3]) };
  // 3/24
  let m2 = val.match(/^(\d+)\/(\d+)$/);
  if (m2) return { y: DEFAULT_ROC_YEAR, m: parseInt(m2[1]), d: parseInt(m2[2]) };
  // 1150324 (7碼: 3年1月2日) or 11504 (5碼: 3年+月日各1-2碼不好判斷，用固定切法)
  // 7碼: YYY MM DD
  let m7 = val.match(/^(\d{3})(\d{2})(\d{2})$/);
  if (m7) return { y: parseInt(m7[1]), m: parseInt(m7[2]), d: parseInt(m7[3]) };
  // 6碼: YYY M DD 或 YYY MM D
  let m6 = val.match(/^(\d{3})(\d{1})(\d{2})$/);
  if (m6 && parseInt(m6[2]) >= 1 && parseInt(m6[2]) <= 9) return { y: parseInt(m6[1]), m: parseInt(m6[2]), d: parseInt(m6[3]) };
  // 4碼無年: MMDD
  let m4 = val.match(/^(\d{2})(\d{2})$/);
  if (m4) return { y: DEFAULT_ROC_YEAR, m: parseInt(m4[1]), d: parseInt(m4[2]) };
  // 3碼無年: MDD
  let m3b = val.match(/^(\d{1})(\d{2})$/);
  if (m3b) return { y: DEFAULT_ROC_YEAR, m: parseInt(m3b[1]), d: parseInt(m3b[2]) };
  return null;
}

function autoAdmitDate() {
  const val = document.getElementById('surgeryDate').value.trim();
  const parsed = parseSurgeryDate(val);
  if (!parsed) { document.getElementById('admitDate').value = ''; return; }
  let { y, m, d } = parsed;
  const date = new Date(y + 1911, m - 1, d);
  date.setDate(date.getDate() - 1);
  const ry = date.getFullYear() - 1911;
  document.getElementById('admitDate').value = `${ry}/${date.getMonth() + 1}/${date.getDate()}`;
}

function renderConsumables() {
  const container = document.getElementById('consumables');
  container.innerHTML = '';
  CONSUMABLES.forEach(item => {
    const div = document.createElement('div');
    div.className = 'checkbox-item' + (item.preselect ? ' checked' : '');
    const noteTag = item.note ? `<span class="required-tag">${item.note}</span>` : '';
    div.innerHTML = `
      <input type="checkbox" id="${item.id}" ${item.preselect ? 'checked' : ''} onchange="toggleItem(this)">
      <span class="item-name">${item.name}${noteTag}</span>
      <span class="item-price">$${item.price.toLocaleString()}</span>
    `;
    div.onclick = function(e) {
      if (e.target.tagName === 'INPUT') return;
      const cb = div.querySelector('input');
      cb.checked = !cb.checked;
      toggleItem(cb);
    };
    container.appendChild(div);
  });
  calcTotal();
}

function toggleItem(cb) {
  const item = cb.closest('.checkbox-item');
  if (cb.checked) item.classList.add('checked');
  else item.classList.remove('checked');
  calcTotal();
}

function calcTotal() {
  let total = 0;
  CONSUMABLES.forEach(item => {
    const cb = document.getElementById(item.id);
    if (cb && cb.checked) total += item.price;
  });
  total += parseInt(document.getElementById('surgeryFee').value) || 0;
  total += parseInt(document.getElementById('anesthesiaFee').value) || 0;
  document.getElementById('totalDisplay').textContent = '$' + total.toLocaleString();
}

function loadTemplate() {
  const idx = document.getElementById('template').value;
  if (idx === '') return;
  const t = TEMPLATES[idx];
  document.getElementById('diagnosis').value = t.diagnosis;
  document.getElementById('surgery').value = t.surgery;
  document.getElementById('purpose').value = t.purpose || '';
  document.getElementById('anesthesia').value = t.anesthesia;
  document.getElementById('stayDays').value = t.stayDays;
  document.getElementById('surgeryFee').value = t.surgeryFee;
  document.getElementById('anesthesiaFee').value = t.anesthesiaFee;
  document.getElementById('surgeryDate').value = t.surgeryDate || '';
  autoAdmitDate();
  if (t.roomType) document.getElementById('roomType').value = t.roomType;

  // Reset all checkboxes then set template items
  CONSUMABLES.forEach(item => {
    const cb = document.getElementById(item.id);
    if (cb) {
      cb.checked = t.items.includes(item.id);
      const div = cb.closest('.checkbox-item');
      if (cb.checked) div.classList.add('checked');
      else div.classList.remove('checked');
    }
  });
  calcTotal();
  generate();
}

function generate() {

  const stayDays = document.getElementById('stayDays').value;
  const admitDate = document.getElementById('admitDate').value.trim();
  const surgeryDateRaw = document.getElementById('surgeryDate').value.trim();
  const parsedDate = parseSurgeryDate(surgeryDateRaw);
  const surgeryDate = parsedDate ? `${parsedDate.y}/${parsedDate.m}/${parsedDate.d}` : surgeryDateRaw;
  const roomType = document.getElementById('roomType').value;
  const surgeryFee = parseInt(document.getElementById('surgeryFee').value) || 0;
  const anesthesiaFee = parseInt(document.getElementById('anesthesiaFee').value) || 0;

  let lines = [];
  const purpose = document.getElementById('purpose').value.trim();
  lines.push(`診斷：${diagnosis}`);
  lines.push(`手術：${surgery}`);
  if (purpose) lines.push(`目的：${purpose}`);
  lines.push('');
  lines.push(`${anesthesia}`);
  lines.push(`住院天數：${stayDays}`);
  if (admitDate) lines.push(`住院日期：${admitDate}`);
  if (surgeryDate) lines.push(`手術日期：${surgeryDate}`);
  lines.push(`房型：${roomType}`);
  lines.push('');

  // Consumables
  let selectedItems = [];
  let itemTotal = 0;
  CONSUMABLES.forEach(item => {
    const cb = document.getElementById(item.id);
    if (cb && cb.checked) {
      selectedItems.push(item);
      itemTotal += item.price;
    }
  });

  lines.push('自費耗材：');
  selectedItems.forEach((item, i) => {
    const prefix = item.note ? `*${item.note}* ` : '';
    lines.push(`${i + 1}. ${prefix}${item.name}　$${item.price.toLocaleString()}`);
  });

  if (selectedItems.length > 0) {
    lines.push(`耗材小計：$${itemTotal.toLocaleString()}`);
  }

  if (surgeryFee > 0) lines.push(`手術費：$${surgeryFee.toLocaleString()}`);
  if (anesthesiaFee > 0) lines.push(`麻醉科指定費：$${anesthesiaFee.toLocaleString()}`);

  let grandTotal = itemTotal + surgeryFee + anesthesiaFee;
  lines.push('');
  lines.push(`自費總計：$${grandTotal.toLocaleString()}`);
  lines.push('');
  lines.push('術後每週回診一次，需三到四週');

  // Get blog info from current template
  const tidx = document.getElementById('template').value;
  if (tidx !== '') {
    const t = TEMPLATES[tidx];
    if (t.blogSearch || t.blogLink) {
      lines.push('');
      if (t.blogSearch) lines.push(t.blogSearch);
      if (t.blogLink) lines.push(t.blogLink);
    }
  }

  document.getElementById('preview').textContent = lines.join('\n');
}

function copyText() {
  const text = document.getElementById('preview').textContent;
  if (!text) { generate(); }
  const finalText = document.getElementById('preview').textContent;
  navigator.clipboard.writeText(finalText).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '已複製！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '複製文字';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Init
renderConsumables();

// PWA service worker (offline support)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>
</body>
</html>
