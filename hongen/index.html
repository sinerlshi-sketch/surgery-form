<h1>宏恩綜合醫院　手術自費表單</h1>

<!-- Template Selection -->
<div class="section">

<div class="section-title">住院資訊</div>

<div>

</div>
</div>

<div>

</select>

床位差額／天（健保床位免付差額）：<br>
雙人房 $2,700（2 床）｜單人房 $3,700（2 床）／$4,250（14 床）｜一房一廳 $6,030（1 床）
</div>
</div>

<div class="section-title">自費耗材</div>
<div class="checkbox-group" id="consumables"></div>
</div>

<div class="note">含單人房住院差額與雜支，依房型與天數調整（約值）。</div>
<div class="toggle-line">
<input type="checkbox" id="endoNote" onchange="generate()">

</div>

<span>自費總計</span>

<!-- Preview & Copy -->

<div class="section-title">預覽</div>

</div>

const DEFAULT_ROC_YEAR = 115;

function parseSurgeryDate(val) {
  let m3 = val.match(/^(\d+)\/(\d+)\/(\d+)$/);
  if (m3) return { y: parseInt(m3[1]), m: parseInt(m3[2]), d: parseInt(m3[3]) };
  let m2 = val.match(/^(\d+)\/(\d+)$/);
  if (m2) return { y: DEFAULT_ROC_YEAR, m: parseInt(m2[1]), d: parseInt(m2[2]) };
  let m7 = val.match(/^(\d{3})(\d{2})(\d{2})$/);
  if (m7) return { y: parseInt(m7[1]), m: parseInt(m7[2]), d: parseInt(m7[3]) };
  let m6 = val.match(/^(\d{3})(\d{1})(\d{2})$/);
  if (m6 && parseInt(m6[2]) >= 1 && parseInt(m6[2]) <= 9) return { y: parseInt(m6[1]), m: parseInt(m6[2]), d: parseInt(m6[3]) };
  let m4 = val.match(/^(\d{2})(\d{2})$/);
  if (m4) return { y: DEFAULT_ROC_YEAR, m: parseInt(m4[1]), d: parseInt(m4[2]) };
  let m3b = val.match(/^(\d{1})(\d{2})$/);
  if (m3b) return { y: DEFAULT_ROC_YEAR, m: parseInt(m3b[1]), d: parseInt(m3b[2]) };
  return null;
}

function autoAdmitDate() {
  const val = document.getElementById('surgeryDate').value.trim();
  const parsed = parseSurgeryDate(val);
  if (!parsed) { document.getElementById('admitDate').value = ''; return; }
  let { y, m, d } = parsed;
  const date = new Date(y + 1911, m - 1, d);
  date.setDate(date.getDate() - 1);
  const ry = date.getFullYear() - 1911;
  document.getElementById('admitDate').value = `${ry}/${date.getMonth() + 1}/${date.getDate()}`;
}

function renderConsumables() {
  const container = document.getElementById('consumables');
  container.innerHTML = '';
  CONSUMABLES.forEach(item => {
    if (item.cat) {
      const h = document.createElement('div');
      h.className = 'cat-head';
      h.textContent = item.cat;
      container.appendChild(h);
      return;
    }
    const div = document.createElement('div');
    div.className = 'checkbox-item' + (item.preselect ? ' checked' : '');
    div.innerHTML = `
      <input type="checkbox" id="${item.id}" ${item.preselect ? 'checked' : ''} onchange="toggleItem(this)">
      <span class="item-name">${item.name}</span>
      <span class="item-price">$${item.price.toLocaleString()}</span>
    `;
    div.onclick = function(e) {
      if (e.target.tagName === 'INPUT') return;
      const cb = div.querySelector('input');
      cb.checked = !cb.checked;
      toggleItem(cb);
    };
    container.appendChild(div);
  });
  calcTotal();
}

function toggleItem(cb) {
  const item = cb.closest('.checkbox-item');
  if (cb.checked) item.classList.add('checked');
  else item.classList.remove('checked');
  calcTotal();
}

function roomFee() {
  const raw = document.getElementById('roomType').value;
  const parts = raw.split('|');
  return parseInt(parts[1]) || 0;
}

function calcTotal() {
  let total = 0;
  CONSUMABLES.forEach(item => {
    if (!item.id) return;
    const cb = document.getElementById(item.id);
    if (cb && cb.checked) total += item.price;
  });
  total += parseInt(document.getElementById('miscFee').value) || 0;
  document.getElementById('totalDisplay').textContent = '$' + total.toLocaleString();
}

function loadTemplate() {
  const idx = document.getElementById('template').value;
  if (idx === '') return;
  const t = TEMPLATES[idx];
  document.getElementById('diagnosis').value = t.diagnosis;
  document.getElementById('surgery').value = t.surgery;
  document.getElementById('purpose').value = t.purpose || '';
  document.getElementById('anesthesia').value = t.anesthesia;
  document.getElementById('stayDays').value = t.stayDays;

  // Reset all checkboxes then set template items
  CONSUMABLES.forEach(item => {
    if (!item.id) return;
    const cb = document.getElementById(item.id);
    if (cb) {
      cb.checked = t.items.includes(item.id);
      const div = cb.closest('.checkbox-item');
      if (cb.checked) div.classList.add('checked');
      else div.classList.remove('checked');
    }
  });
  document.getElementById('endoNote').checked = !!t.endo;
  calcTotal();
  generate();
}

function generate() {
  const diagnosis = document.getElementById('diagnosis').value.trim();
  const surgery = document.getElementById('surgery').value.trim();
  const purpose = document.getElementById('purpose').value.trim();
  const anesthesia = document.getElementById('anesthesia').value;
  const stayDays = document.getElementById('stayDays').value;
  const admitDate = document.getElementById('admitDate').value.trim();
  const surgeryDateRaw = document.getElementById('surgeryDate').value.trim();
  const parsedDate = parseSurgeryDate(surgeryDateRaw);
  const surgeryDate = parsedDate ? `${parsedDate.y}/${parsedDate.m}/${parsedDate.d}` : surgeryDateRaw;
  const roomLabel = document.getElementById('roomType').value.split('|')[0];
  const miscFee = parseInt(document.getElementById('miscFee').value) || 0;

  let lines = [];
  lines.push('宏恩綜合醫院　手術自費說明');
  lines.push('');

  // Patient info (only filled)
  const pName = document.getElementById('pName').value.trim();
  const pId = document.getElementById('pId').value.trim();
  const pBirth = document.getElementById('pBirth').value.trim();
  const pPhone = document.getElementById('pPhone').value.trim();
  const pAddr = document.getElementById('pAddr').value.trim();
  let hasPatient = false;
  if (pName)  { lines.push(`姓名：${pName}`); hasPatient = true; }
  if (pId)    { lines.push(`身份證字號：${pId}`); hasPatient = true; }
  if (pBirth) { lines.push(`生日：${pBirth}`); hasPatient = true; }
  if (pPhone) { lines.push(`電話：${pPhone}`); hasPatient = true; }
  if (pAddr)  { lines.push(`地址：${pAddr}`); hasPatient = true; }
  if (hasPatient) lines.push('');

  lines.push(`診斷：${diagnosis}`);
  lines.push(`手術：${surgery}`);
  if (purpose) lines.push(`目的：${purpose}`);
  lines.push('');
  lines.push(`${anesthesia}`);
  lines.push(`住院天數：${stayDays}`);
  if (admitDate) lines.push(`住院日期：${admitDate}`);
  if (surgeryDate) lines.push(`手術日期：${surgeryDate}`);
  lines.push(`房型：${roomLabel}`);
  lines.push('');

  // Consumables
  let selectedItems = [];
  let itemTotal = 0;
  CONSUMABLES.forEach(item => {
    if (!item.id) return;
    const cb = document.getElementById(item.id);
    if (cb && cb.checked) {
      selectedItems.push(item);
      itemTotal += item.price;
    }
  });

  lines.push('自費耗材：');
  selectedItems.forEach((item, i) => {
    lines.push(`${i + 1}. ${item.name}　$${item.price.toLocaleString()}`);
  });
  if (selectedItems.length > 0) lines.push(`耗材小計：$${itemTotal.toLocaleString()}`);

  if (miscFee > 0) lines.push(`單人房／雜費（約）：$${miscFee.toLocaleString()}`);

  let grandTotal = itemTotal + miscFee;
  lines.push('');
  lines.push(`自費總計（約）：$${grandTotal.toLocaleString()}`);
  lines.push('');
  lines.push('術後每週回診一次，需三到四週');

  if (document.getElementById('endoNote').checked) {
    lines.push('');
    lines.push(ENDO_NOTE);
  }

  lines.push('');
  lines.push('────────────');
  lines.push(HOSPITAL_FOOTER);

  document.getElementById('preview').textContent = lines.join('\n');
}

function copyText() {
  if (!document.getElementById('preview').textContent) generate();
  const finalText = document.getElementById('preview').textContent;
  navigator.clipboard.writeText(finalText).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '已複製！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '複製文字';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Init
renderConsumables();
generate();

// PWA service worker (offline support)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>
